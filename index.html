<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>Nexus Security Lab</title>


    <link rel="stylesheet" href="style.css">


</head>


<body>


<!-- ==========================
     Boot Screen
========================== -->


<div id="bootScreen">


    <h1>
        🦊 Nexus Security Lab
    </h1>


    <p id="bootText">
        BOOTING...
    </p>



    <div id="loadingBox">

        <div id="loadingBar"></div>

    </div>



    <p id="percent">
        0%
    </p>


</div>





<!-- ==========================
     Main Screen
========================== -->


<div id="mainScreen" style="display:none;">



    <h1 id="siteTitle">

        🦊 Nexus Security Lab

    </h1>




    <!-- Language Button -->


    <button 
        onclick="changeLanguage()" 
        id="langBtn">

        한국어

    </button>







    <h2 id="reverse">

        Reverse Engineering

    </h2>




    <h2 id="malware">

        Malware Analysis

    </h2>




    <h2 id="ai">

        AI Security

    </h2>





    <hr>





    <p id="msg">

        Welcome Researcher.

    </p>





    <p id="level">

        Access Level : Guest

    </p>







    <!-- Password -->


    <input

        type="password"

        id="password"

        placeholder="Enter Password">






    <br><br>





    <button onclick="login()">

        LOGIN

    </button>







    <hr>







    <p id="date"></p>


    <p id="clock"></p>







    <hr>






    <h2 id="terminalTitle">

        Terminal

    </h2>






    <div id="terminal">



        <div id="output"></div>





        <input

            id="terminalInput"

            placeholder="Type command..."

            onkeydown="terminalCommand(event)">





    </div>





</div>






<script src="script.js"></script>



</body>


</html>
